<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Offline · StockEx</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <!--
      Standalone, self-contained offline shell. Served by the service
      worker as the navigation fallback whenever the network can't
      reach the Next.js app server. Everything (CSS, copy, retry
      handler) is inlined so this file resolves from the SW cache
      with zero outgoing requests — that's the whole point of an
      offline page.
    -->
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(1200px 600px at 50% -20%, rgba(16,185,129,0.12), transparent 60%), #0a0a0a;
        color: #f5f5f5;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 440px;
        width: 100%;
        text-align: center;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 32px 24px;
        backdrop-filter: blur(8px);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.15);
        border: 1px solid rgba(245, 158, 11, 0.35);
        color: #fde68a;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 18px;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 999px;
        background: #f59e0b;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 20px;
        color: #a3a3a3;
        font-size: 14px;
        line-height: 1.55;
      }
      .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
      button, a.btn {
        appearance: none;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        font-size: 14px;
        padding: 10px 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        text-decoration: none;
        transition: transform 80ms ease, background 120ms ease, border-color 120ms ease;
      }
      button.primary {
        background: linear-gradient(180deg, #10b981, #059669);
        color: #052e1c;
        border-color: rgba(255,255,255,0.1);
      }
      button.primary:hover { transform: translateY(-1px); }
      a.btn.secondary {
        background: rgba(255,255,255,0.04);
        color: #e5e5e5;
        border-color: rgba(255,255,255,0.12);
      }
      a.btn.secondary:hover { background: rgba(255,255,255,0.08); }
      .meta { margin-top: 18px; font-size: 12px; color: #737373; }
      .icon {
        width: 56px; height: 56px;
        margin: 0 auto 14px;
        display: grid; place-items: center;
        border-radius: 16px;
        background: rgba(245,158,11,0.12);
        border: 1px solid rgba(245,158,11,0.3);
      }
      svg { width: 28px; height: 28px; stroke: #f59e0b; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="icon" aria-hidden="true">
          <!-- Wi-Fi-off glyph -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 2l20 20" />
            <path d="M8.5 16.5a5 5 0 017 0" />
            <path d="M5 12.55a11 11 0 015.17-2.39" />
            <path d="M1.42 9a16 16 0 015.71-3.36" />
            <path d="M22.58 9a16 16 0 00-7.6-4.42" />
            <line x1="12" y1="20" x2="12.01" y2="20" />
          </svg>
        </div>
        <span class="badge"><span class="dot"></span> Offline</span>
        <h1>You&rsquo;re offline</h1>
        <p>
          StockEx needs an internet connection for live quotes,
          order placement, and account data. Your session is safe &mdash;
          reconnect to pick up where you left off.
        </p>
        <div class="actions">
          <button class="primary" id="retry" type="button">Try again</button>
          <a class="btn secondary" href="/" id="home">Go home</a>
        </div>
        <div class="meta">StockEx</div>
      </section>
    </main>
    <script>
      // Auto-retry when the OS signals connectivity is back, so the
      // user doesn't have to tap "Try again" themselves.
      function reload() { location.reload(); }
      document.getElementById('retry').addEventListener('click', reload);
      window.addEventListener('online', reload);
    </script>
  </body>
</html>
