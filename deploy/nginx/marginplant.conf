# ─────────────────────────────────────────────────────────────────────
#  MarginPlant Broker — production nginx config
#  Live at /etc/nginx/sites-available/marginplant on the origin host.
#  scripts/deploy.sh syncs this file when it changes between commits.
#
#  Cloudflare is in front of all four hostnames (DNS Proxied, orange
#  cloud). With Cloudflare SSL = Flexible the edge terminates HTTPS for
#  the browser and connects to this origin over plain HTTP — that's why
#  every server block listens on :80 only and there are no SSL cert
#  paths here. To upgrade to Full (strict) later, drop a Cloudflare
#  Origin Certificate into /etc/ssl/cloudflare/ and add the matching
#  `listen 443 ssl http2 / ssl_certificate ... / ssl_certificate_key ...`
#  block on each server.
# ─────────────────────────────────────────────────────────────────────

# Connection upgrade map — "upgrade" only when client requests WebSocket,
# else "close". Without this, normal HTTP requests (CORS preflight OPTIONS)
# hang because nginx sends Connection: upgrade to backend, confusing uvicorn.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── marginplant.com / www → user Next.js (3000) ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name marginplant.com www.marginplant.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare terminates TLS; Next.js / FastAPI must believe the
        # client used HTTPS so generated URLs / cookies use the https
        # scheme. Without this `req.url` reads http:// and Set-Cookie
        # Secure-only cookies get rejected by the browser.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# ── admin.marginplant.com → admin Next.js (3001) ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name admin.marginplant.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# ── api.marginplant.com → FastAPI (8000) + WebSocket ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.marginplant.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
